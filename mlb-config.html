<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>MLB Live Settings</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:40px}
    .hdr{background:#111;border-bottom:1px solid #222;padding:20px;text-align:center;position:sticky;top:0;z-index:10}
    .hdr h1{font-size:18px;font-weight:700;letter-spacing:3px;color:#fff}
    .hdr p{font-size:11px;color:#555;letter-spacing:1px;margin-top:4px}
    .body{padding:24px 20px 0}
    .lbl{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:8px}
    select{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:16px;outline:none;-webkit-appearance:none;appearance:none}
    .arrow{position:relative}
    .arrow::after{content:"▼";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#666;pointer-events:none;font-size:12px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px 16px;margin-top:16px}
    .toggle-label{font-size:15px;color:#f0f0f0}
    .toggle-sub{font-size:11px;color:#555;margin-top:2px}
    .switch{position:relative;width:51px;height:31px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:#333;border-radius:31px;transition:.3s;cursor:pointer}
    .slider:before{content:"";position:absolute;width:25px;height:25px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
    input:checked + .slider{background:#e8a000}
    input:checked + .slider:before{transform:translateX(20px)}
    .btn{display:block;width:100%;margin-top:24px;padding:15px;background:#e8a000;color:#000;font-size:16px;font-weight:800;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .btn:active{background:#c88800}
    .coffee{display:block;text-align:center;margin-top:20px;color:#555;font-size:12px;text-decoration:none;letter-spacing:1px;}
    .coffee span{color:#e8a000;}
    .divider{height:1px;background:#1e1e1e;margin:24px 0 0}
  </style>
</head>
<body>
  <div class="hdr">
    <h1>⚾ MLB LIVE</h1>
    <p>WATCHFACE SETTINGS</p>
  </div>
  <div class="body">

    <div class="lbl">Favorite Team</div>
    <div class="arrow">
      <select id="team">
        <option value="0">ARI - D-backs</option>
        <option value="1">ATL - Braves</option>
        <option value="2">BAL - Orioles</option>
        <option value="3">BOS - Red Sox</option>
        <option value="4">CHC - Cubs</option>
        <option value="5">CWS - White Sox</option>
        <option value="6">CIN - Reds</option>
        <option value="7">CLE - Guardians</option>
        <option value="8">COL - Rockies</option>
        <option value="9">DET - Tigers</option>
        <option value="10">HOU - Astros</option>
        <option value="11">KCR - Royals</option>
        <option value="12">LAA - Angels</option>
        <option value="13">LAD - Dodgers</option>
        <option value="14">MIA - Marlins</option>
        <option value="15">MIL - Brewers</option>
        <option value="16">MIN - Twins</option>
        <option value="17">NYM - Mets</option>
        <option value="18">NYY - Yankees</option>
        <option value="19">OAK - Athletics</option>
        <option value="20">PHI - Phillies</option>
        <option value="21">PIT - Pirates</option>
        <option value="22">SDP - Padres</option>
        <option value="23">SEA - Mariners</option>
        <option value="24">SFG - Giants</option>
        <option value="25">STL - Cardinals</option>
        <option value="26">TBR - Rays</option>
        <option value="27">TEX - Rangers</option>
        <option value="28">TOR - Blue Jays</option>
        <option value="29">WSN - Nationals</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="lbl" style="margin-top:24px">Notifications</div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Vibrate on Score</div>
        <div class="toggle-sub">Pulse when your team scores a run</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="vibrate" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row" style="margin-top:10px">
      <div>
        <div class="toggle-label">Battery Bar</div>
        <div class="toggle-sub">Show battery level at bottom of screen</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="batteryBar" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div style="text-align:center;margin-top:20px">
      <a href="https://venmo.com/YOUR-VENMO-USERNAME" target="_blank" 
         style="color:#e8a000;font-size:15px;text-decoration:none;font-weight:600;letter-spacing:1px">
        Buy me a coffee &#9749;
      </a>
    </div>

    <button class="btn" id="save">Save &amp; Close</button>
  </div>

  <script>
    // Parse hash: format is #teamIdx|vibrate e.g. #2|1
    var hash       = location.hash.replace("#", "");
    var parts      = hash.split("|");
    var savedIdx   = parseInt(parts[0]);
    var savedVib   = parts[1] !== "0";
    var savedBat   = parts[2] !== "0";  // default on

    if (!isNaN(savedIdx) && savedIdx >= 0 && savedIdx <= 29) {
      document.getElementById("team").value = String(savedIdx);
    }
    document.getElementById("vibrate").checked    = savedVib;
    document.getElementById("batteryBar").checked = savedBat;

    document.getElementById("save").addEventListener("click", function() {
      var idx        = parseInt(document.getElementById("team").value);
      var vibrate    = document.getElementById("vibrate").checked    ? 1 : 0;
      var batteryBar = document.getElementById("batteryBar").checked ? 1 : 0;
      var payload = JSON.stringify({ teamIdx: idx, vibrate: vibrate, batteryBar: batteryBar });
      window.location.href = "pebblejs://close#" + encodeURIComponent(payload);
    });
  </script>
</body>
</html>
